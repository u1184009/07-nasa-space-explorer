<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="brand-bar">
    <img src="img/NASA-Logo-Large.jpg" alt="NASA logo" class="nasa-brand-mark" />
  </div>

  <div class="container py-4">
    <header class="site-header">
      <div class="site-title">
        <h1>Space Explorer</h1>
        <p class="site-tagline">Browse the latest Astronomy Picture of the Day</p>
      </div>
    </header>

    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button id="fetchButton" type="button">Get Space Images</button>
    </div>

    <div class="space-fact-banner" role="status" aria-live="polite">
      <p class="space-fact-label">Did you know?</p>
      <p id="spaceFactText" class="space-fact-text"></p>
    </div>

    <div id="gallery" class="gallery row g-4">
      <div class="col-12">
        <div class="placeholder">
          <div class="placeholder-icon">🔭</div>
          <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="apodModal" tabindex="-1" aria-labelledby="apodModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title fs-5" id="apodModalLabel"></h2>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <img id="modalImage" src="" alt="" class="img-fluid rounded modal-image" />
          <p id="modalDate" class="text-muted mt-3 mb-2"></p>
          <p id="modalExplanation" class="modal-explanation"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
